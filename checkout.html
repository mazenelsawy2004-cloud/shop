<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسار — إتمام الطلب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c111d;
    --panel:#111828;
    --card:#161f34;
    --card-2:#1b2540;
    --gold:#c9a15a;
    --gold-light:#e6c98a;
    --gold-dim:#8a6f3f;
    --text:#eef0f5;
    --text-dim:#8b93a9;
    --text-faint:#5c6480;
    --border:#26304a;
    --error:#e2665a;
    --success:#7fbf7f;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Tajawal', sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding:40px 20px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }

  .top{
    max-width:1080px;
    margin:0 auto 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .logo{display:flex; align-items:center; gap:10px;}
  .logo-name{font-family:'Cairo', sans-serif; font-weight:800; font-size:19px;}
  .secure-badge{
    display:flex; align-items:center; gap:8px;
    color:var(--text-dim); font-size:13px;
  }

  /* ===== STEPPER ===== */
  .stepper{
    max-width:1080px;
    margin:0 auto 36px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:0;
  }
  .step{
    display:flex; align-items:center; gap:10px;
    color:var(--text-faint);
    font-size:13.5px;
    font-weight:700;
    font-family:'Cairo', sans-serif;
  }
  .step-circle{
    width:26px; height:26px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    border:1.5px solid var(--border);
    font-size:12px;
    background:var(--panel);
  }
  .step.done .step-circle{background:var(--gold); border-color:var(--gold); color:#221a0d;}
  .step.active .step-circle{border-color:var(--gold-light); color:var(--gold-light);}
  .step.active, .step.done{color:var(--text);}
  .step-line{
    width:64px; height:1px;
    background:var(--border);
    margin:0 12px;
  }
  .step-line.done{background:var(--gold-dim);}

  /* ===== LAYOUT ===== */
  .layout{
    max-width:1080px;
    margin:0 auto;
    display:grid;
    grid-template-columns: 1.35fr 1fr;
    gap:28px;
    align-items:start;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:28px;
  }
  .card + .card{margin-top:20px;}
  .card-title{
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size:16.5px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .card-title .num{
    width:24px; height:24px;
    border-radius:50%;
    background:var(--card);
    border:1px solid var(--gold-dim);
    color:var(--gold-light);
    font-size:12px;
    display:flex; align-items:center; justify-content:center;
  }

  /* form fields (shared language) */
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .field{position:relative; margin-bottom:16px;}
  .field input, .field select{
    width:100%;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:15px 16px;
    font-family:'Tajawal', sans-serif;
    font-size:14px;
    color:var(--text);
    outline:none;
    transition:border-color 0.25s ease, background 0.25s ease;
    appearance:none;
  }
  .field input::placeholder{color:transparent;}
  .field label{
    position:absolute; right:16px; top:15px;
    color:var(--text-faint); font-size:14px;
    pointer-events:none; transition:all 0.2s ease;
  }
  .field input:focus, .field input:not(:placeholder-shown){
    border-color:var(--gold-dim); background:var(--card-2);
  }
  .field input:focus + label, .field input:not(:placeholder-shown) + label{
    top:-9px; font-size:11px; color:var(--gold-light);
    background:var(--panel); padding:0 6px; right:11px;
  }
  .field.select-field label{
    position:static; display:block; font-size:12px; color:var(--text-dim);
    margin-bottom:7px;
  }
  .field select{color:var(--text); cursor:pointer;}

  /* payment method tiles */
  .pay-methods{display:flex; gap:10px; margin-bottom:20px;}
  .pay-tile{
    flex:1;
    border:1.5px solid var(--border);
    background:var(--card);
    border-radius:10px;
    padding:14px 10px;
    text-align:center;
    cursor:pointer;
    transition:border-color 0.2s ease, background 0.2s ease;
  }
  .pay-tile.selected{border-color:var(--gold); background:var(--card-2);}
  .pay-tile svg{display:block; margin:0 auto 8px;}
  .pay-tile span{font-size:12.5px; color:var(--text-dim); font-weight:500;}
  .pay-tile.selected span{color:var(--gold-light);}

  .card-icons{display:flex; gap:8px; position:absolute; left:14px; top:15px;}

  /* ===== ORDER SUMMARY ===== */
  .summary-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:26px;
    position:sticky;
    top:24px;
  }
  .summary-title{
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size:16.5px;
    margin-bottom:18px;
  }
  .item-row{
    display:flex;
    gap:12px;
    padding:12px 0;
    border-bottom:1px solid var(--border);
  }
  .item-row:last-of-type{border-bottom:none;}
  .item-thumb{
    width:52px; height:52px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--card-2), var(--card));
    border:1px solid var(--border);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .item-info{flex:1; min-width:0;}
  .item-name{font-size:13.5px; font-weight:500; margin-bottom:3px;}
  .item-meta{font-size:12px; color:var(--text-faint);}
  .item-price{font-size:13.5px; font-weight:700; font-family:'Cairo', sans-serif; white-space:nowrap;}

  .promo{
    display:flex; gap:8px;
    margin:18px 0;
  }
  .promo input{
    flex:1;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 14px;
    color:var(--text);
    font-size:13px;
    outline:none;
  }
  .promo input:focus{border-color:var(--gold-dim);}
  .promo button{
    padding:0 18px;
    border:1px solid var(--gold-dim);
    background:transparent;
    color:var(--gold-light);
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    font-family:'Cairo', sans-serif;
    cursor:pointer;
    transition:background 0.2s ease;
  }
  .promo button:hover{background:var(--card-2);}

  .totals{margin-top:6px;}
  .total-row{
    display:flex; justify-content:space-between;
    font-size:13.5px; color:var(--text-dim);
    padding:7px 0;
  }
  .total-row.discount span:last-child{color:var(--success);}
  .total-row.grand{
    border-top:1px solid var(--border);
    margin-top:10px;
    padding-top:14px;
    font-size:17px;
    font-weight:800;
    font-family:'Cairo', sans-serif;
    color:var(--text);
  }
  .total-row.grand span:last-child{color:var(--gold-light);}

  .btn-checkout{
    width:100%;
    margin-top:20px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(180deg, var(--gold-light), var(--gold));
    color:#221a0d;
    font-family:'Cairo', sans-serif;
    font-weight:800;
    font-size:15.5px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:10px;
    box-shadow:0 12px 28px rgba(201,161,90,0.2);
    transition:transform 0.15s ease, box-shadow 0.25s ease;
  }
  .btn-checkout:hover{transform:translateY(-1px); box-shadow:0 16px 34px rgba(201,161,90,0.3);}
  .btn-checkout:active{transform:translateY(0);}
  .btn-checkout .spinner{
    width:16px; height:16px;
    border:2px solid rgba(34,26,13,0.3);
    border-top-color:#221a0d;
    border-radius:50%;
    display:none;
    animation:spin 0.7s linear infinite;
  }
  .btn-checkout.loading .spinner{display:inline-block;}
  .btn-checkout.loading .btn-label{opacity:0.7;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .trust-row{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:16px;
    font-size:12px;
    color:var(--text-faint);
  }

  @media (max-width: 860px){
    .layout{grid-template-columns:1fr;}
    .grid-2{grid-template-columns:1fr;}
    .summary-card{position:static;}
    .stepper .step span.step-text{display:none;}
    .step-line{width:32px;}
  }
</style>
</head>
<body>

  <div class="top">
    <div class="logo">
      <svg width="30" height="30" viewBox="0 0 38 38">
        <polygon points="19,3 24,14 36,14 27,22 30,34 19,27 8,34 11,22 2,14 14,14"
          fill="none" stroke="#e6c98a" stroke-width="1.6"/>
      </svg>
      <span class="logo-name">مسار</span>
    </div>
    <a href="store.html" style="color:var(--text-dim); font-size:13px; text-decoration:none; margin-inline-start:auto; margin-inline-end:20px;">← الرجوع للمتجر</a>
    <div class="secure-badge">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8b93a9" stroke-width="2"><path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3Z"/></svg>
      دفع آمن ومشفّر
    </div>
  </div>

  <div class="stepper">
    <div class="step done">
      <div class="step-circle">✓</div>
      <span class="step-text">السلة</span>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-circle">2</div>
      <span class="step-text">الدفع والشحن</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-circle">3</div>
      <span class="step-text">التأكيد</span>
    </div>
  </div>

  <div class="layout">

    <!-- LEFT: FORMS -->
    <div>
      <div class="card">
        <div class="card-title"><span class="num">1</span> بيانات الشحن</div>
        <div class="grid-2">
          <div class="field">
            <input type="text" placeholder=" " required>
            <label>الاسم الأول</label>
          </div>
          <div class="field">
            <input type="text" placeholder=" " required>
            <label>الاسم الأخير</label>
          </div>
        </div>
        <div class="field">
          <input type="text" placeholder=" " required>
          <label>العنوان بالتفصيل</label>
        </div>
        <div class="grid-2">
          <div class="field">
            <input type="text" placeholder=" " required>
            <label>المدينة</label>
          </div>
          <div class="field select-field">
            <label>المحافظة</label>
            <select>
              <option>القاهرة</option>
              <option>الجيزة</option>
              <option>الإسكندرية</option>
              <option>أخرى</option>
            </select>
          </div>
        </div>
        <div class="field" style="margin-bottom:0;">
          <input type="tel" placeholder=" " required>
          <label>رقم الهاتف</label>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="num">2</span> طريقة الدفع</div>

        <div class="pay-methods">
          <div class="pay-tile selected" onclick="selectPay(this)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e6c98a" stroke-width="1.6"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            <span>بطاقة ائتمان</span>
          </div>
          <div class="pay-tile" onclick="selectPay(this)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b93a9" stroke-width="1.6"><path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3Z"/></svg>
            <span>محفظة رقمية</span>
          </div>
          <div class="pay-tile" onclick="selectPay(this)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b93a9" stroke-width="1.6"><path d="M3 7h18M3 12h18M3 17h10"/></svg>
            <span>الدفع عند الاستلام</span>
          </div>
        </div>

        <div id="cardFields">
          <div class="field" style="position:relative;">
            <input type="text" placeholder=" " inputmode="numeric" required>
            <label>رقم البطاقة</label>
            <div class="card-icons">
              <svg width="26" height="17" viewBox="0 0 26 17"><rect width="26" height="17" rx="3" fill="#26304a"/><circle cx="9" cy="8.5" r="5" fill="#c9a15a" opacity="0.6"/><circle cx="16" cy="8.5" r="5" fill="#e6c98a" opacity="0.5"/></svg>
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <input type="text" placeholder=" " required>
              <label>تاريخ الانتهاء (شهر/سنة)</label>
            </div>
            <div class="field">
              <input type="text" placeholder=" " inputmode="numeric" maxlength="3" required>
              <label>CVC</label>
            </div>
          </div>
          <div class="field" style="margin-bottom:0;">
            <input type="text" placeholder=" " required>
            <label>الاسم كما يظهر على البطاقة</label>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="summary-card">
      <div class="summary-title">ملخص الطلب</div>

      <div id="itemsContainer"></div>

      <div class="promo">
        <input type="text" placeholder="كود الخصم">
        <button type="button">تطبيق</button>
      </div>

      <div class="totals" id="totalsContainer"></div>

      <button class="btn-checkout" id="checkoutBtn" onclick="proceedCheckout()">
        <span class="spinner"></span>
        <span class="btn-label">إتمام الطلب الآن</span>
      </button>

      <div class="trust-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5c6480" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        بياناتك محمية بتشفير SSL 256-بت
      </div>
    </div>

  </div>

<script>
const icons = {
  bag: '<rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/>',
  watch: '<circle cx="12" cy="12" r="7"/><path d="M12 9v3l2 2"/><path d="M9 2h6M9 22h6"/>',
  wallet: '<rect x="2" y="6" width="20" height="14" rx="2"/><path d="M16 12h4"/>',
  glasses: '<circle cx="6" cy="12" r="4"/><circle cx="18" cy="12" r="4"/><path d="M10 12h4M2 12l2-3M22 12l-2-3"/>',
  belt: '<rect x="2" y="10" width="20" height="4" rx="1"/><circle cx="12" cy="12" r="2"/>',
  book: '<path d="M4 4h13a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4Z"/><path d="M4 17a3 3 0 0 1 3-3h13"/>'
};

function getCart(){
  try{ return JSON.parse(localStorage.getItem('masar_cart') || '[]'); }
  catch(e){ return []; }
}
function saveCart(cart){ localStorage.setItem('masar_cart', JSON.stringify(cart)); }

function changeQty(id, delta){
  const cart = getCart();
  const item = cart.find(i => i.id === id);
  if(!item) return;
  item.qty += delta;
  const updated = item.qty <= 0 ? cart.filter(i => i.id !== id) : cart;
  saveCart(updated);
  renderCheckout();
}

function renderCheckout(){
  const cart = getCart();
  const itemsContainer = document.getElementById('itemsContainer');
  const totalsContainer = document.getElementById('totalsContainer');
  const checkoutBtn = document.getElementById('checkoutBtn');

  if(cart.length === 0){
    itemsContainer.innerHTML = `
      <div style="text-align:center; padding:20px 0; color:var(--text-faint); font-size:13.5px;">
        السلة فارغة حاليًا.<br>
        <a href="store.html" class="link" style="color:var(--gold-light); text-decoration:none; font-weight:600;">تصفّح المتجر لإضافة منتجات</a>
      </div>`;
    totalsContainer.innerHTML = '';
    checkoutBtn.style.opacity = '0.5';
    checkoutBtn.style.pointerEvents = 'none';
    return;
  }

  checkoutBtn.style.opacity = '1';
  checkoutBtn.style.pointerEvents = 'auto';

  itemsContainer.innerHTML = cart.map(item => `
    <div class="item-row">
      <div class="item-thumb">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8b93a9" stroke-width="1.5">${icons[item.icon] || icons.bag}</svg>
      </div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta" style="display:flex; align-items:center; gap:8px;">
          <button onclick="changeQty('${item.id}', -1)" style="background:var(--card); border:1px solid var(--border); color:var(--text-dim); width:20px; height:20px; border-radius:5px; cursor:pointer; font-size:12px; line-height:1;">−</button>
          <span>الكمية: ${item.qty}</span>
          <button onclick="changeQty('${item.id}', 1)" style="background:var(--card); border:1px solid var(--border); color:var(--text-dim); width:20px; height:20px; border-radius:5px; cursor:pointer; font-size:12px; line-height:1;">+</button>
        </div>
      </div>
      <div class="item-price">${(item.price * item.qty).toLocaleString('ar-EG')} ج.م</div>
    </div>
  `).join('');

  const subtotal = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
  const shipping = subtotal > 0 ? 60 : 0;
  const grand = subtotal + shipping;

  totalsContainer.innerHTML = `
    <div class="total-row"><span>المجموع الفرعي</span><span>${subtotal.toLocaleString('ar-EG')} ج.م</span></div>
    <div class="total-row"><span>الشحن</span><span>${shipping} ج.م</span></div>
    <div class="total-row grand"><span>الإجمالي</span><span>${grand.toLocaleString('ar-EG')} ج.م</span></div>
  `;
}

function selectPay(el){
  document.querySelectorAll('.pay-tile').forEach(t => {
    t.classList.remove('selected');
    t.querySelector('svg').setAttribute('stroke', '#8b93a9');
  });
  el.classList.add('selected');
  el.querySelector('svg').setAttribute('stroke', '#e6c98a');

  const cardFields = document.getElementById('cardFields');
  cardFields.style.display = el.querySelector('span').textContent.includes('بطاقة') ? 'block' : 'none';
}

function proceedCheckout(){
  const btn = document.getElementById('checkoutBtn');
  if(btn.classList.contains('loading')) return;
  btn.classList.add('loading');
  btn.querySelector('.btn-label').textContent = 'جارٍ تأكيد الطلب...';
  setTimeout(() => {
    btn.querySelector('.btn-label').textContent = 'تم تأكيد الطلب ✓';
    btn.style.background = 'linear-gradient(180deg, #9fd39f, #7fbf7f)';
    localStorage.removeItem('masar_cart');
  }, 1800);
}

renderCheckout();
</script>

</body>
</html>
